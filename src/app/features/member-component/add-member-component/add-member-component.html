<div class="container">
  <h2>Add New Member</h2>
  <form [formGroup]="memberForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="name">Full Name</label>
      <input id="name" type="text" formControlName="name" placeholder="Enter member name">
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input id="email" type="email" formControlName="email" placeholder="Enter member email">
    </div>

    <div class="form-group">
      <label for="role">Role</label>
      <select id="role" formControlName="role">
        <option value="">Select role</option>
        <option value="Admin">Admin</option>
        <option value="Developer">Developer</option>
        <option value="QA">QA</option>
        <option value="Designer">Designer</option>
      </select>
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <select id="status" formControlName="status">
        <option value="">Select status</option>
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
      </select>
    </div>

    <div class="form-group">
      <label for="joined">Joined Date</label>
      <input id="joined" type="date" formControlName="joined">
    </div>

    <div class="actions">
      <button type="submit" [disabled]="memberForm.invalid">+ Add Member</button>
    </div>
  </form>
</div>
